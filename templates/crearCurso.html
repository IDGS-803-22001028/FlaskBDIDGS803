{% extends "layout.html" %}
{% block container %}

<div class="max-w-sm mx-auto mt-10">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="mb-5">
            <label class="block mb-2 text-sm font-medium">Nombre del Curso</label>
            <input type="text" name="nombre" class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5" required />
        </div>

        <div class="mb-5">
            <label class="block mb-2 text-sm font-medium">Descripción</label>
            <textarea name="descripcion" class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5"></textarea>
        </div>

        <div class="mb-5">
            <label class="block mb-2 text-sm font-medium">Maestro</label>
            <select name="maestro" class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5" required>
                <option value="">-- Selecciona un maestro --</option>
                {% for maestro in maestros %}
                <option value="{{ maestro.matricula }}">{{ maestro.nombre }} {{ maestro.apellidos }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit"
            class="text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5">
            Guardar Curso
        </button>
    </form>
</div>

{% endblock %}
