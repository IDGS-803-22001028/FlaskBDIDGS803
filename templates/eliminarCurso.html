{% extends "layout.html" %}
{% block container %}

<div class="max-w-sm mx-auto mt-10 pb-20">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <h2 class="text-2xl font-semibold mb-6">Eliminar curso</h2>

        <div class="mb-5">
            <label class="block mb-2 text-sm font-medium">Nombre del Curso</label>
            <input type="text" value="{{ curso.nombre }}" class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5" disabled />
        </div>

        <div class="mb-5">
            <label class="block mb-2 text-sm font-medium">Descripción</label>
            <textarea class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5" disabled>{{ curso.descripcion }}</textarea>
        </div>

        <div class="mb-5">
            <label class="block mb-2 text-sm font-medium">Maestro</label>
            <input type="text" value="{{ curso.maestro.nombre }} {{ curso.maestro.apellidos }}" class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5" disabled />
        </div>

        <div class="flex gap-4 mt-6 justify-end">
            <a href="{{ url_for('cursos.listado_cursos') }}" 
               class="text-white bg-blue-500 hover:bg-blue-600 font-medium rounded-lg text-sm px-5 py-2.5">
               Cancelar
            </a>
            <button type="submit"
                class="text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5">
                Eliminar
            </button>
        </div>
    </form>
</div>

{% endblock %}
