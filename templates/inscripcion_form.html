{% extends 'layout.html' %}
{% block container %}

<div class="max-w-md mx-auto mt-10 bg-white p-6 border border-gray-200 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-6">Nueva Inscripción</h1>

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="mb-4">
            <label class="block mb-2 text-sm font-medium text-gray-700">Alumno</label>
            <select name="alumno" required class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5">
                <option value="">Elige un alumno</option>
                {% for alumno in alumnos %}
                <option value="{{ alumno.id }}">{{ alumno.nombre }} {{ alumno.apellidos }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-6">
            <label class="block mb-2 text-sm font-medium text-gray-700">Curso</label>
            <select name="curso" required class="bg-gray-50 border border-gray-300 text-sm rounded-lg block w-full p-2.5">
                <option value="">Elige un curso</option>
                {% for curso in cursos %}
                <option value="{{ curso.id }}">{{ curso.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="flex justify-between">
            <a href="{{ url_for('inscripciones.listado_inscripciones') }}" class="text-white bg-gray-500 hover:bg-gray-600 rounded-lg text-sm px-5 py-2.5">Cancelar</a>
            <button type="submit" class="text-white bg-blue-700 hover:bg-blue-800 rounded-lg text-sm px-5 py-2.5">Inscribir</button>
        </div>
    </form>
</div>

{% endblock %}
